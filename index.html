<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión - Proveedor Hub</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body data-page="login">
  <div class="auth-wrap">
    <div class="card auth-card">
      <div class="card-body">
        <div class="auth-top">
          <img src="https://i.ibb.co/BfCjKQt/logo-bia-blanco.png" alt="BIA Energy" loading="lazy" />
          <div>
            <div class="auth-title">Proveedor Hub</div>
            <div class="auth-sub">Gestión de proveedores, cotizaciones y comparativos.</div>
          </div>
        </div>
        <div class="divider"></div>
        <p class="muted" style="margin-bottom:14px;">Inicia sesión para continuar.</p>

        <!-- Botón de Google -->
        <button type="button" onclick="loginWithGoogle()" style="
          width:100%; display:flex; align-items:center; justify-content:center;
          gap:10px; padding:12px; border-radius:10px; border:1px solid #dadce0;
          background:#fff; color:#3c4043; font-size:14px; font-weight:500;
          cursor:pointer; margin-bottom:12px; transition: box-shadow .2s;
        " onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,0.15)'"
           onmouseout="this.style.boxShadow='none'">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continuar con Google
        </button>

        <!-- Separador -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <div style="flex:1;height:1px;background:#dde3ed;"></div>
          <span style="color:#888;font-size:12px;">o continúa con correo</span>
          <div style="flex:1;height:1px;background:#dde3ed;"></div>
        </div>

        <div style="display:grid;gap:10px;">
          <input type="email" id="loginEmail" class="input" placeholder="Correo electrónico" />
          <input type="password" id="loginPass" class="input" placeholder="Contraseña" />
          <button class="btn btn-primary" id="btnLogin">Iniciar sesión</button>
          <a class="btn" href="register.html" style="text-align:center;">Crear cuenta nueva</a>
        </div>
        <div id="loginMsg" style="margin-top:10px;font-size:13px;display:none;padding:10px;border-radius:10px;"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-client.js?v=12"></script>
  <script>
  function showMsg(t,ok){var m=document.getElementById('loginMsg');m.style.display='block';m.style.background=ok?'rgba(0,229,200,0.1)':'rgba(255,77,109,0.1)';m.style.color=ok?'#00e5c8':'#ff4d6d';m.textContent=t}

  var sb=getSupabase();

  document.getElementById('btnLogin').onclick=async function(){
    var email=document.getElementById('loginEmail').value.trim();
    var pass=document.getElementById('loginPass').value;
    if(!email||!pass){showMsg('Ingresa correo y contraseña.',false);return}
    this.disabled=true;this.textContent='Iniciando sesión...';
    var r=await sb.auth.signInWithPassword({email:email,password:pass});
    if(r.error){showMsg(r.error.message,false);this.disabled=false;this.textContent='Iniciar sesión';return}
    window.location.href='home.html';
  };

  window.loginWithGoogle = async function() {
    var r = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname.replace('index.html', 'home.html') } });
    if(r.error) showMsg(r.error.message,false);
  };

  // If already logged in via active session, go to home
  (async function(){
    try{
      var r=await sb.auth.getUser();
      if(r.data&&r.data.user){
        window.location.href='home.html';
      }
    }catch(e){}
  })();
  </script>
</body>
</html>
