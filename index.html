<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión - Proveedor Hub</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body data-page="login">
  <div class="auth-wrap">
    <div class="card auth-card">
      <div class="card-body">
        <div class="auth-top">
          <img src="https://i.ibb.co/BfCjKQt/logo-bia-blanco.png" alt="BIA Energy" loading="lazy" />
          <div>
            <div class="auth-title">Proveedor Hub</div>
            <div class="auth-sub">Gestión de proveedores, cotizaciones y comparativos.</div>
          </div>
        </div>
        <div class="divider"></div>
        <p class="muted" style="margin-bottom:14px;">Inicia sesión para continuar.</p>
        <div style="display:grid;gap:10px;">
          <input type="email" id="loginEmail" class="input" placeholder="Correo electrónico" />
          <input type="password" id="loginPass" class="input" placeholder="Contraseña" />
          <button class="btn btn-primary" id="btnLogin">Iniciar sesión</button>
          <a class="btn" href="register.html" style="text-align:center;">Crear cuenta nueva</a>
        </div>
        <div id="loginMsg" style="margin-top:10px;font-size:13px;display:none;padding:10px;border-radius:10px;"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
  var SUPA_URL='https://fepivzcobddybztuiyge.supabase.co';
  var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlcGl2emNvYmJkeWJ6dHVpeWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODkxMDMsImV4cCI6MjA4OTQ2NTEwM30.ZwUjlkqiucO3bzLW-Rw4CGUS3N4wsNFrjLl2ZyPa4PU';
  var sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);

  function showMsg(t,ok){var m=document.getElementById('loginMsg');m.style.display='block';m.style.background=ok?'rgba(0,229,200,0.1)':'rgba(255,77,109,0.1)';m.style.color=ok?'#00e5c8':'#ff4d6d';m.textContent=t}

  document.getElementById('btnLogin').onclick=async function(){
    var email=document.getElementById('loginEmail').value.trim();
    var pass=document.getElementById('loginPass').value;
    if(!email||!pass){showMsg('Ingresa correo y contraseña.',false);return}
    this.disabled=true;this.textContent='Iniciando sesión...';
    var r=await sb.auth.signInWithPassword({email:email,password:pass});
    if(r.error){showMsg(r.error.message,false);this.disabled=false;this.textContent='Iniciar sesión';return}
    localStorage.setItem('currentUser',JSON.stringify({name:r.data.user.user_metadata?.full_name||email.split('@')[0],email:email}));
    window.location.href='home.html';
  };

  // If already logged in, go to home
  (async function(){
    try{
      var r=await sb.auth.getUser();
      if(r.data&&r.data.user){
        localStorage.setItem('currentUser',JSON.stringify({name:r.data.user.user_metadata?.full_name||r.data.user.email.split('@')[0],email:r.data.user.email}));
        window.location.href='home.html';
      }
    }catch(e){}
  })();
  </script>
</body>
</html>
