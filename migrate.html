<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Migración a Supabase — v3</title>
  <style>
    body { padding: 40px; font-family: 'Inter', sans-serif; background: #0a0d1a; color: #fff; }
    .card { background: #151a2e; border: 1px solid #232a45; padding: 24px; border-radius: 14px; max-width: 800px; margin: 0 auto; }
    .btn { padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; background: #00e5c8; color: #0a0d1a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .log { background: #000; color: #00e5c8; padding: 12px; font-family: monospace; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; height: 400px; overflow-y: auto; font-size: 12px; }
  </style>
</head>
<body>

<div class="card">
  <h2>🚢 Migración de Precios Legacy → Supabase (v3)</h2>
  <p style="color:#8088b0; margin-bottom: 24px;">
    Este script sube los 855 precios del archivo local antiguo a la tabla <code>sku_offers</code> de Supabase.<br>
    Columnas usadas: <code>sku_id</code> (text), <code>provider</code> (text nombre), <code>price_sin_iva</code> (numeric).
  </p>

  <button class="btn" id="btnStart">▶ Iniciar Migración de Precios</button>
  <div class="log" id="logger">Esperando para iniciar...\n</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js?v=999"></script>
<script src="sku_offers_legacy.js"></script>

<script>
  const logger = document.getElementById('logger');
  function log(msg) { logger.textContent += msg + '\n'; logger.scrollTop = logger.scrollHeight; }
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const chunk = (arr, size) => Array.from({ length: Math.ceil(arr.length / size) }, (v, i) => arr.slice(i * size, i * size + size));

  document.getElementById('btnStart').onclick = async function() {
    this.disabled = true;
    this.textContent = 'Migrando... No cierres esta pestaña';
    const sb = typeof getSupabase === 'function' ? getSupabase() : null;
    if (!sb) { log('[ERROR] Cliente Supabase no disponible.'); return; }

    try {
      // ── STEP 1: Get existing offers to avoid duplicates ──
      log('--- Paso 1: Cargando ofertas existentes en Supabase ---');
      const { data: existOffers, error: offErr } = await sb.from('sku_offers').select('sku_id, provider');
      if (offErr) throw new Error('Error cargando ofertas: ' + offErr.message);
      const existSet = new Set((existOffers || []).map(o => o.sku_id + '::' + (o.provider||'').toLowerCase()));
      log('Ofertas ya existentes: ' + existSet.size);

      // ── STEP 2: Read legacy offers from localStorage ──
      log('\n--- Paso 2: Procesando ofertas legacy ---');
      let legacyStore = {};
      try {
        const raw = localStorage.getItem('skuOffersById');
        legacyStore = raw ? JSON.parse(raw) : {};
      } catch(e) { log('[AVISO] No se pudo leer localStorage: ' + e.message); }

      let totalLegacy = 0;
      for (const skuId in legacyStore) {
        if (Array.isArray(legacyStore[skuId])) totalLegacy += legacyStore[skuId].length;
      }
      log('Total ofertas legacy en localStorage: ' + totalLegacy);

      if (totalLegacy === 0) {
        log('[AVISO] El localStorage está vacío. Asegúrate de que la app principal haya cargado sku_offers_legacy.js primero.');
        log('Abriendo la página principal para cargar los datos...');
        // Try to fallback - the legacy js file writes to localStorage on load
        // If we got here, it means the IIFE already ran. Let's re-read.
        await sleep(1000);
        try {
          const raw2 = localStorage.getItem('skuOffersById');
          legacyStore = raw2 ? JSON.parse(raw2) : {};
          for (const skuId in legacyStore) {
            if (Array.isArray(legacyStore[skuId])) totalLegacy += legacyStore[skuId].length;
          }
          log('Re-lectura: ' + totalLegacy + ' ofertas encontradas.');
        } catch(e2) {}
      }

      // ── STEP 3: Map and prepare inserts ──
      log('\n--- Paso 3: Mapeando ofertas al schema de Supabase ---');
      const toInsert = [];
      let duplicate = 0;

      for (const skuId in legacyStore) {
        const textSkuId = String(skuId);
        const offers = legacyStore[skuId];
        if (!Array.isArray(offers)) continue;

        for (const off of offers) {
          const provName = (off.provider || '').trim();
          if (!provName) continue;

          const dedupKey = textSkuId + '::' + provName.toLowerCase();
          if (existSet.has(dedupKey)) { duplicate++; continue; }

          toInsert.push({
            sku_id: textSkuId,
            provider: provName,
            price_sin_iva: parseFloat(off.price_sin_iva) || 0
          });
          existSet.add(dedupKey);
        }
      }

      log('\nResultado del mapeo:');
      log('  → Para insertar: ' + toInsert.length);
      log('  → Ya existentes (omitidos): ' + duplicate);

      // ── STEP 4: Bulk insert ──
      if (toInsert.length > 0) {
        log('\n--- Paso 4: Insertando ' + toInsert.length + ' ofertas en Supabase ---');
        const chunks = chunk(toInsert, 100);
        let inserted = 0;
        for (let i = 0; i < chunks.length; i++) {
          const { error } = await sb.from('sku_offers').insert(chunks[i]);
          if (error) {
            log('[ERROR] Chunk ' + (i+1) + '/' + chunks.length + ': ' + error.message);
          } else {
            inserted += chunks[i].length;
            log('  Chunk ' + (i+1) + '/' + chunks.length + ': OK (' + inserted + ' insertadas)');
          }
          await sleep(300);
        }
        log('\nTotal insertadas: ' + inserted + ' de ' + toInsert.length);
      } else {
        log('\nNo hay ofertas nuevas para insertar. Todo ya está migrado.');
      }

      log('\n=============================================');
      log('✨ ¡MIGRACIÓN COMPLETADA EXITOSAMENTE!');
      log('=============================================');
      this.textContent = '✔ Migración finalizada';
      this.style.background = '#28c864';

    } catch(err) {
      log('\n[ERROR CRÍTICO] ' + err.message);
      this.textContent = 'Falló';
      this.style.background = '#ff4d6d';
      this.disabled = false;
    }
  };
</script>
</body>
</html>
