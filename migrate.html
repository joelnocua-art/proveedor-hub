<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Migración a Supabase — v4 (Force Update)</title>
  <style>
    body { padding: 40px; font-family: 'Inter', sans-serif; background: #0a0d1a; color: #fff; }
    .card { background: #151a2e; border: 1px solid #232a45; padding: 24px; border-radius: 14px; max-width: 800px; margin: 0 auto; }
    .btn { padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; background: #00e5c8; color: #0a0d1a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .log { background: #000; color: #00e5c8; padding: 12px; font-family: monospace; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; height: 400px; overflow-y: auto; font-size: 12px; }
  </style>
</head>
<body>

<div class="card">
  <h2>🚢 Forzar Actualización de Precios (v4)</h2>
  <p style="color:#8088b0; margin-bottom: 24px;">
    Este script lee el localStorage y fuerza un UPSERT para guardar el precio real en la columna <code>price</code> de Supabase.<br>
  </p>

  <button class="btn" id="btnStart">▶ Iniciar Reparación de Precios</button>
  <div class="log" id="logger">Esperando para iniciar...\n</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js?v=999"></script>

<!-- We inject the legacy local storage directly to be absolutely sure -->
<script src="sku_offers_legacy.js"></script>

<script>
  const logger = document.getElementById('logger');
  function log(msg) { logger.textContent += msg + '\n'; logger.scrollTop = logger.scrollHeight; }
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const chunk = (arr, size) => Array.from({ length: Math.ceil(arr.length / size) }, (v, i) => arr.slice(i * size, i * size + size));

  document.getElementById('btnStart').onclick = async function() {
    this.disabled = true;
    this.textContent = 'Reparando...';
    const sb = typeof getSupabase === 'function' ? getSupabase() : null;
    if (!sb) { log('[ERROR] Cliente Supabase no disponible.'); return; }

    try {
      let legacyStore = {};
      try {
        const raw = localStorage.getItem('skuOffersById');
        legacyStore = raw ? JSON.parse(raw) : {};
      } catch(e) { log('[AVISO] No se pudo leer localStorage'); }

      const toUpsert = [];
      for (const skuId in legacyStore) {
        const textSkuId = String(skuId);
        const offers = legacyStore[skuId];
        if (!Array.isArray(offers)) continue;

        for (const off of offers) {
          const provName = String(off.provider || '').trim();
          if (!provName) continue;
          
          const priceVal = parseFloat(off.price_sin_iva);
          if (!priceVal || priceVal <= 0) continue; // Only push valid prices

          toUpsert.push({
            sku_id: textSkuId,
            provider: provName,
            price: priceVal // Map correctly to the 'price' column in Supabase!
          });
        }
      }

      log('\n--- Paso 1: Mapeadas ' + toUpsert.length + ' ofertas válidas. ---');

      if (toUpsert.length > 0) {
        log('\n--- Paso 2: Ejecutando Upsert ---');
        const chunks = chunk(toUpsert, 50);
        let inserted = 0;
        for (let i = 0; i < chunks.length; i++) {
          // Force UPSERT: if combination sku_id+provider exists, it updates 'price'
          const { error } = await sb.from('sku_offers').upsert(chunks[i], { onConflict: 'sku_id,provider' });
          if (error) {
            log('[ERROR] Chunk ' + (i+1) + ': ' + error.message);
          } else {
            inserted += chunks[i].length;
            log('  Chunk ' + (i+1) + ': OK (' + inserted + ' procesadas)');
          }
          await sleep(200);
        }
        log('\nTotal reparadas: ' + inserted + ' de ' + toUpsert.length);
      } else {
        log('\nNo se encontraron precios válidos para reparar.');
      }

      log('\n=============================================');
      log('✨ ¡REPARACIÓN COMPLETADA!');
      log('=============================================');
      this.textContent = '✔ Reparación finalizada';
      this.style.background = '#28c864';

    } catch(err) {
      log('\n[ERROR CRÍTICO] ' + err.message);
      this.textContent = 'Falló';
      this.style.background = '#ff4d6d';
      this.disabled = false;
    }
  };
</script>
</body>
</html>
