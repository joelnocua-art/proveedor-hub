<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Migración a Supabase — v2</title>
  <style>
    body { padding: 40px; font-family: 'Inter', sans-serif; background: #0a0d1a; color: #fff; }
    .card { background: #151a2e; border: 1px solid #232a45; padding: 24px; border-radius: 14px; max-width: 800px; margin: 0 auto; }
    .btn { padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; background: #00e5c8; color: #0a0d1a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .log { background: #000; color: #00e5c8; padding: 12px; font-family: monospace; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; height: 400px; overflow-y: auto; font-size: 12px; }
  </style>
</head>
<body>

<div class="card">
  <h2>🚢 Migración de Precios Legacy → Supabase (v2)</h2>
  <p style="color:#8088b0; margin-bottom: 24px;">
    Este script sube los 855 precios del archivo local antiguo (<code>sku_offers_legacy.js</code>) a la tabla <code>sku_offers</code> de Supabase.<br>
    <strong>No toca los proveedores ni el catálogo SKU</strong> (ya están correctos en Supabase).
  </p>

  <button class="btn" id="btnStart">▶ Iniciar Migración de Precios</button>
  <div class="log" id="logger">Esperando para iniciar...\n</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js?v=999"></script>
<script src="sku_offers_legacy.js"></script>

<script>
  const logger = document.getElementById('logger');
  function log(msg) { logger.textContent += msg + '\n'; logger.scrollTop = logger.scrollHeight; }
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const chunk = (arr, size) => Array.from({ length: Math.ceil(arr.length / size) }, (v, i) => arr.slice(i * size, i * size + size));

  document.getElementById('btnStart').onclick = async function() {
    this.disabled = true;
    this.textContent = 'Migrando... No cierres esta pestaña';
    const sb = typeof getSupabase === 'function' ? getSupabase() : null;
    if (!sb) { log('[ERROR] Cliente Supabase no disponible.'); return; }

    try {
      // ── STEP 1: Get current providers from Supabase to map names → IDs ──
      log('--- Paso 1: Cargando proveedores de Supabase ---');
      const { data: provRows, error: provErr } = await sb.from('providers').select('id, nombre_empresa');
      if (provErr) throw new Error('Error cargando proveedores: ' + provErr.message);
      
      // Build a map: lowercase provider name → provider id
      const provMap = {};
      (provRows || []).forEach(p => {
        if (p.nombre_empresa) provMap[p.nombre_empresa.trim().toLowerCase()] = p.id;
      });
      log('Proveedores en Supabase: ' + Object.keys(provMap).length);
      log('Nombres: ' + Object.keys(provMap).join(', '));

      // ── STEP 2: Get current SKU catalog to validate sku_ids ──
      log('\n--- Paso 2: Cargando catálogo SKU de Supabase ---');
      const { data: skuRows, error: skuErr } = await sb.from('sku_catalog').select('id');
      if (skuErr) throw new Error('Error cargando SKUs: ' + skuErr.message);
      const validSkuIds = new Set((skuRows || []).map(s => String(s.id)));
      log('SKUs en Supabase: ' + validSkuIds.size);

      // ── STEP 3: Get existing offers to avoid duplicates ──
      log('\n--- Paso 3: Cargando ofertas existentes en Supabase ---');
      const { data: existOffers, error: offErr } = await sb.from('sku_offers').select('sku_id, provider_id');
      if (offErr) throw new Error('Error cargando ofertas: ' + offErr.message);
      const existSet = new Set((existOffers || []).map(o => o.sku_id + '::' + o.provider_id));
      log('Ofertas ya existentes: ' + existSet.size);

      // ── STEP 4: Read legacy offers from localStorage seed ──
      log('\n--- Paso 4: Procesando ofertas legacy ---');
      // The legacy file seeds localStorage with an IIFE. We read it back.
      let legacyStore = {};
      try {
        const raw = localStorage.getItem('skuOffersById');
        legacyStore = raw ? JSON.parse(raw) : {};
      } catch(e) { log('[AVISO] No se pudo leer localStorage: ' + e.message); }

      // Count total legacy offers
      let totalLegacy = 0;
      for (const skuId in legacyStore) {
        if (Array.isArray(legacyStore[skuId])) totalLegacy += legacyStore[skuId].length;
      }
      log('Total ofertas legacy en localStorage: ' + totalLegacy);

      // ── STEP 5: Map and prepare inserts ──
      log('\n--- Paso 5: Mapeando ofertas al schema de Supabase ---');
      const toInsert = [];
      let skipped = 0, noProvider = 0, noSku = 0, duplicate = 0;

      for (const skuId in legacyStore) {
        const textSkuId = String(skuId);
        if (!validSkuIds.has(textSkuId)) { noSku++; continue; }

        const offers = legacyStore[skuId];
        if (!Array.isArray(offers)) continue;

        for (const off of offers) {
          const provName = (off.provider || '').trim().toLowerCase();
          const providerId = provMap[provName];
          if (!providerId) {
            // Try partial match
            let found = null;
            for (const key in provMap) {
              if (key.indexOf(provName) !== -1 || provName.indexOf(key.split(' ')[0]) !== -1) {
                found = provMap[key]; break;
              }
            }
            if (!found) { noProvider++; skipped++; continue; }
            // Use partial match
            var pid = found;
          } else {
            var pid = providerId;
          }

          const dedupKey = textSkuId + '::' + pid;
          if (existSet.has(dedupKey)) { duplicate++; continue; }

          toInsert.push({
            sku_id: textSkuId,
            provider_id: pid,
            price: parseFloat(off.price_sin_iva) || 0,
            currency: 'COP',
            vat_included: false
          });
          existSet.add(dedupKey); // prevent further dupes from same batch
        }
      }

      log('\nResultado del mapeo:');
      log('  → Para insertar: ' + toInsert.length);
      log('  → Ya existentes (omitidos): ' + duplicate);
      log('  → SKU no encontrado en Supabase: ' + noSku);
      log('  → Proveedor no encontrado: ' + noProvider);

      // ── STEP 6: Bulk insert ──
      if (toInsert.length > 0) {
        log('\n--- Paso 6: Insertando ' + toInsert.length + ' ofertas en Supabase ---');
        const chunks = chunk(toInsert, 100);
        let inserted = 0;
        for (let i = 0; i < chunks.length; i++) {
          const { error } = await sb.from('sku_offers').insert(chunks[i]);
          if (error) {
            log('[ERROR] Chunk ' + (i+1) + '/' + chunks.length + ': ' + error.message);
          } else {
            inserted += chunks[i].length;
            log('  Chunk ' + (i+1) + '/' + chunks.length + ': OK (' + inserted + ' insertadas)');
          }
          await sleep(300);
        }
        log('\nTotal insertadas: ' + inserted + ' de ' + toInsert.length);
      } else {
        log('\n--- No hay ofertas nuevas para insertar ---');
      }

      log('\n=============================================');
      log('✨ ¡MIGRACIÓN COMPLETADA EXITOSAMENTE!');
      log('=============================================');
      this.textContent = '✔ Migración finalizada';
      this.style.background = '#28c864';

    } catch(err) {
      log('\n[ERROR CRÍTICO] ' + err.message);
      this.textContent = 'Falló';
      this.style.background = '#ff4d6d';
      this.disabled = false;
    }
  };
</script>
</body>
</html>
