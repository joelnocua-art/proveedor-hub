<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - Proveedor Hub</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body data-page="register">
  <div class="auth-wrap">
    <div class="card auth-card">
      <div class="card-body">
        <div class="auth-top">
          <img src="https://i.ibb.co/BfCjKQt/logo-bia-blanco.png" alt="BIA Energy" loading="lazy" />
          <div>
            <div class="auth-title">Crear cuenta</div>
            <div class="auth-sub">Regístrate en Proveedor Hub — BIA Energy.</div>
          </div>
        </div>
        <div class="divider"></div>
        <div style="display:grid;gap:10px;">
          <input type="text" id="regName" class="input" placeholder="Nombre completo" />
          <input type="email" id="regEmail" class="input" placeholder="Correo electrónico" />
          <input type="password" id="regPass" class="input" placeholder="Contraseña (mínimo 6 caracteres)" />
          <button class="btn btn-primary" id="btnReg">Crear cuenta</button>
          <a class="btn" href="index.html" style="text-align:center;">Ya tengo cuenta — Iniciar sesión</a>
        </div>
        <div id="regMsg" style="margin-top:10px;font-size:13px;display:none;padding:10px;border-radius:10px;"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
  var SUPA_URL='https://fepivzcobddybztuiyge.supabase.co';
  var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlcGl2emNvYmJkeWJ6dHVpeWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODkxMDMsImV4cCI6MjA4OTQ2NTEwM30.ZwUjlkqiucO3bzLW-Rw4CGUS3N4wsNFrjLl2ZyPa4PU';
  var sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);

  function showMsg(t,ok){var m=document.getElementById('regMsg');m.style.display='block';m.style.background=ok?'rgba(0,229,200,0.1)':'rgba(255,77,109,0.1)';m.style.color=ok?'#00e5c8':'#ff4d6d';m.textContent=t}

  document.getElementById('btnReg').onclick=async function(){
    var name=document.getElementById('regName').value.trim();
    var email=document.getElementById('regEmail').value.trim();
    var pass=document.getElementById('regPass').value;
    if(!name||!email||!pass){showMsg('Completa todos los campos.',false);return}
    if(pass.length<6){showMsg('La contraseña debe tener al menos 6 caracteres.',false);return}
    this.disabled=true;this.textContent='Creando cuenta...';
    var r=await sb.auth.signUp({email:email,password:pass,options:{data:{full_name:name}}});
    if(r.error){showMsg(r.error.message,false);this.disabled=false;this.textContent='Crear cuenta';return}
    showMsg('Cuenta creada. Redirigiendo...',true);
    setTimeout(function(){window.location.href='index.html'},1500);
  };
  </script>
</body>
</html>
